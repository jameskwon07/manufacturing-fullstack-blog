<section class="comments" aria-label="댓글">
  <h2>댓글</h2>
  <p class="muted">GitHub 계정으로 댓글을 남길 수 있습니다.</p>
  {% if site.comments.provider == "utterances" and site.comments.repo %}
    <script src="https://utteranc.es/client.js"
      repo="{{ site.comments.repo }}"
      issue-term="{{ site.comments.issue_term | default: 'pathname' }}"
      label="{{ site.comments.label | default: 'comment' }}"
      theme="{{ site.comments.theme | default: 'github-light' }}"
      crossorigin="anonymous"
      async>
    </script>
  {% endif %}
</section>
