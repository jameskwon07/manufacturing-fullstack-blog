<!doctype html>
<html lang="{{ site.lang | default: 'ko-KR' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
    {% feed_meta %}
    {% seo %}
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav" aria-label="주요 메뉴">
        <a href="{{ '/' | relative_url }}">글</a>
        <a href="{{ '/categories/' | relative_url }}">카테고리</a>
        <a href="{{ '/search/' | relative_url }}">검색</a>
        <a href="{{ '/about/' | relative_url }}">소개</a>
      </nav>
    </header>
    <main class="site-main">
      {{ content }}
    </main>
    <footer class="site-footer">
      <p>회사 업무나 내부 정보는 다루지 않으며, 모든 글은 개인 학습과 공개 자료를 바탕으로 합니다.</p>
    </footer>
  </body>
</html>
