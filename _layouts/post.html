---
layout: default
---

<article class="post">
  <header class="post-header">
    <p class="post-meta">{{ page.date | date: "%Y.%m.%d" }} · {{ page.categories | join: ", " }}</p>
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p class="lede">{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  {% if page.comments %}
    {% include comments.html %}
  {% endif %}
</article>
