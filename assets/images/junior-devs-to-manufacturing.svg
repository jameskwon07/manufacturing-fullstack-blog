    <rect x="938" y="112" width="64" height="158" rx="6" fill="#dce8e2" stroke="#b9cbc2"/>
    <rect x="1022" y="172" width="46" height="98" rx="6" fill="#dce8e2" stroke="#b9cbc2"/>
    <path d="M836 272 H1084" stroke="#839990" stroke-width="9" stroke-linecap="round"/>
