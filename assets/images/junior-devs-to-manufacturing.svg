<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Junior developers exploring manufacturing software</title>
  <desc id="desc">An abstract illustration of junior software developers moving from generic code projects toward manufacturing software and domain understanding.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfcf8"/>
      <stop offset="0.55" stop-color="#edf5ef"/>
      <stop offset="1" stop-color="#dfeee7"/>
    </linearGradient>
    <linearGradient id="path" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9e7df"/>
      <stop offset="1" stop-color="#aac6ba"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#14342b" flood-opacity="0.13"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <path d="M0 500 C150 455 275 498 415 458 C585 409 710 462 878 415 C1015 377 1110 394 1200 350 L1200 630 L0 630 Z" fill="#d7e6de"/>
  <path d="M88 552 C290 480 455 464 600 472 C760 481 880 532 1112 459 L1072 630 L108 630 Z" fill="url(#path)"/>

